name: Deploy PixelForge to GitHub Pages

on:
  push:
    branches: [main] # Робот спрацьовує, коли ти оновлюєш гілку main

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Робот бере вміст папки dist і викладає на хостинг
          branch: gh-pages # Спеціальна гілка для хостингу сторінок
